name: 🧪 CI – Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 · Lint & Format Check
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 Install linting tools
        run: pip install ruff

      - name: 🔎 Run Ruff linter
        run: ruff check backend/ tests/

      - name: 🎨 Run Ruff formatter check
        run: ruff format --check backend/ tests/

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 · Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: erp_password
          POSTGRES_DB: ai_erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://erp_user:erp_password@localhost:5432/ai_erp_test
      DATABASE_URL_SYNC: postgresql://erp_user:erp_password@localhost:5432/ai_erp_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SECRET_KEY: ci-test-secret-key
      ENVIRONMENT: test
      UPLOAD_DIR: /tmp/ai_erp_uploads

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: 🗃️ Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -U erp_user; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: 🧪 Run tests with coverage
        run: |
          pytest tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          name: codecov-py${{ matrix.python-version }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 · Docker Build Validation
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-erp:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 · Security Scan
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 Install safety
        run: pip install safety pip-audit

      - name: 🔍 Audit dependencies for vulnerabilities
        run: |
          pip install -r requirements.txt
          pip-audit --desc || true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 5 · CI Summary (all jobs must pass)
  # ─────────────────────────────────────────────────────────────────────────────
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build, security]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.docker-build.result }}" = "failure" ]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed!"
