name: 🏷️ Auto Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: 🏷️ Add Labels
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Label based on changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
